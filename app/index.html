<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Workflows</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --font-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
        --bg: #faf9f7;
        --bg-surface: #ffffff;
        --bg-muted: #f3f1ee;
        --bg-hover: #eeedea;
        --border: #e2e0db;
        --border-light: #eeece8;
        --text: #2c2c2c;
        --text-muted: #8a8780;
        --text-dim: #b5b2ac;
        --accent: #5a5a5a;
        --dot-idle: #c4c2bd;
        --dot-planning: #9b8cd8;
        --dot-developing: #6b9ede;
        --dot-testing: #d4a54a;
        --dot-reviewing: #d487b4;
        --dot-merging: #5abcb4;
        --dot-done: #7aba6e;
        --dot-failed: #cf6b6b;
        --dot-awaiting: #d4a54a;
        --line-color: #d1cfc9;
        --stream-bg: #fefefe;
        --col-planner: #f5f0ff;
        --col-developer: #f0f5ff;
        --col-tester: #fdf8ee;
        --col-reviewer: #fdf0f7;
        --col-githubber: #eefaf8;
        --col-manager: #f5f5f0;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      @keyframes slide-left {
        from { transform: translateX(0); }
        to { transform: translateX(-20px); }
      }

      @keyframes fade-in {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes draw-line {
        from { width: 0; }
        to { width: 40px; }
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

      input, button { font-family: var(--font-mono); }

      ::selection {
        background: #e0ddd8;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
